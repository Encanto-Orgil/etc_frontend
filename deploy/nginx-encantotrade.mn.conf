# Nginx site config for encantotrade.mn
# Install: sudo cp deploy/nginx-encantotrade.mn.conf /etc/nginx/sites-available/encantotrade.mn
#          sudo ln -sf /etc/nginx/sites-available/encantotrade.mn /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream etc_frontend {
    server 127.0.0.1:3000 fail_timeout=0;
}

# www → apex redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.encantotrade.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://encantotrade.mn$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name encantotrade.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.encantotrade.mn;

    ssl_certificate /etc/letsencrypt/live/encantotrade.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/encantotrade.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://encantotrade.mn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name encantotrade.mn;

    ssl_certificate /etc/letsencrypt/live/encantotrade.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/encantotrade.mn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Next.js static assets (immutable hashed files)
    location /_next/static/ {
        proxy_pass http://etc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public images, favicons, etc.
    location /images/ {
        proxy_pass http://etc_frontend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://etc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }
}
